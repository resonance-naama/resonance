async function callUrl(url) {
  const resp = await fetch(url, { mode: 'cors' });
  return resp.json();
}

async function migrate() {
  const btn = document.getElementById('btn');
  const bar = document.getElementById('bar');
  const prg = document.getElementById('progress');
  const st  = document.getElementById('status');

  btn.disabled = true;
  btn.textContent = 'Migration en cours…';
  prg.style.display = 'block';

  try {
    for (let i = 0; i < URLS.length; i++) {
      st.textContent = 'Envoi morceau ' + (i+1) + ' / ' + URLS.length + '…';
      bar.style.width = Math.round((i / URLS.length) * 90) + '%';
      await callUrl(URLS[i]);
      await new Promise(r => setTimeout(r, 150)); // pause anti-flood
    }

    st.textContent = 'Fusion des données…';
    bar.style.width = '95%';
    await callUrl(MERGE);
    bar.style.width = '100%';

    st.className = 'status ok';
    st.innerHTML = '✅ Migration terminée avec succès !<br>' +
      '<a href="https://docs.google.com/spreadsheets/d/1Z_3mbRov_YoYLXUKQ6HUr0Uar9VTLjhnWx0pSTFqh0g/edit" target="_blank">Vérifier dans Google Sheets →</a>';
    btn.textContent = '✅ Terminé';

  } catch(e) {
    st.className = 'status err';
    st.textContent = '❌ Erreur : ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Réessayer';
  }
}

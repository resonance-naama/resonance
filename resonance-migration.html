async function migrate() {
  const btn = document.getElementById('btn');
  const st  = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Migration en cours…';
  st.className = 'status';
  st.textContent = '';
  try {
    const resp = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveSiteData', token: TOKEN, siteId: 'LERHIN', data: DATA })
    });
    const result = await resp.json();
    if(result.ok) {
      st.className = 'status ok';
      st.textContent = '✅ Migration réussie ! Les données du Rhin sont maintenant dans Google Sheets.';
      btn.textContent = 'Migration terminée';
    } else {
      throw new Error(result.error || 'Erreur inconnue');
    }
  } catch(e) {
    st.className = 'status err';
    st.textContent = '❌ Erreur : ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Réessayer';
  }
}
</script>
